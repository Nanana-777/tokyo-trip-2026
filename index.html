<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東京漫遊之旅 | Ginza Foodie</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ramune: '#A2D2E2',
                        muji: '#F5F5F5',
                        earth: '#4A4A4A',
                        tabelog: '#FF9900',
                        google: '#4285F4',
                    },
                    fontFamily: { sans: ['M PLUS Rounded 1c', 'Noto Sans TC', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8F9FA; color: #4A4A4A; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; animation: fadeIn 0.2s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .bottom-nav-item.active { color: #A2D2E2; }
        .cat-btn.active { background-color: #A2D2E2; color: white; border-color: #A2D2E2; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-shadow { box-shadow: 0 10px 25px -5px rgba(162, 210, 226, 0.15); }
    </style>
</head>
<body class="pb-28 font-sans">

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-bold tracking-tighter text-ramune italic uppercase">Tokyo Food</h1>
            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Ginza 900+ Database</p>
        </div>
        <div class="w-10 h-10 bg-ramune/10 rounded-2xl flex items-center justify-center text-ramune shadow-inner">
            <i class="fa-solid fa-utensils text-lg"></i>
        </div>
    </header>

    <main class="px-4 pt-6">
        <!-- 美食分頁 -->
        <section id="food" class="tab-content active">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-bold border-b-4 border-ramune inline-block text-earth tracking-tight">餐廳清單</h2>
                <span id="food-count" class="text-[10px] text-gray-400 font-bold bg-white px-3 py-1 rounded-full border border-gray-100 shadow-sm">0 / 0</span>
            </div>

            <!-- 搜尋與過濾區 (Sticky) -->
            <div class="sticky top-[76px] z-20 bg-[#F8F9FA]/95 backdrop-blur-md pb-4 space-y-3">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-ramune/40 text-[10px]"></i>
                    <input type="text" id="food-search-input" placeholder="搜尋店名、招牌菜、分類..."
                        class="w-full bg-white border-none rounded-2xl pl-10 pr-4 py-4 text-sm shadow-sm ring-1 ring-black/5 focus:ring-ramune transition-all"
                        onkeyup="applyAllFilters()">
                </div>

                <!-- 分類按鈕區 -->
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                    <button onclick="setCategory('all')" class="cat-btn shrink-0 px-4 py-2 rounded-xl border border-ramune/10 text-[11px] font-bold bg-white text-gray-400 active" id="cat-all">全部</button>
                    <button onclick="setCategory('ラーメン')" class="cat-btn shrink-0 px-4 py-2 rounded-xl border border-ramune/10 text-[11px] font-bold bg-white text-gray-400" id="cat-ramen">🍜 ラーメン</button>
                    <button onclick="setCategory('そば')" class="cat-btn shrink-0 px-4 py-2 rounded-xl border border-ramune/10 text-[11px] font-bold bg-white text-gray-400" id="cat-soba">🥢 そば</button>
                    <button onclick="setCategory('うどん')" class="cat-btn shrink-0 px-4 py-2 rounded-xl border border-ramune/10 text-[11px] font-bold bg-white text-gray-400" id="cat-udon">🍥 うどん</button>
                    <button onclick="setCategory('高評分')" class="cat-btn shrink-0 px-4 py-2 rounded-xl border border-orange-100 text-[11px] font-bold bg-orange-50 text-orange-400" id="cat-high">🏆 3.6+</button>
                </div>

                <!-- 排序選擇器 -->
                <div class="flex items-center justify-between px-1">
                    <select id="food-sort" onchange="applyAllFilters()" class="bg-transparent text-[10px] font-bold text-gray-400 border-none focus:ring-0 p-0 cursor-pointer">
                        <option value="tabelog">按 Tabelog 評分排序</option>
                        <option value="google">按 Google 評分排序</option>
                        <option value="reviews">按評論數量排序</option>
                    </select>
                    <i class="fa-solid fa-arrow-down-wide-short text-gray-200 text-xs"></i>
                </div>
            </div>

            <!-- 資料顯示區域 -->
            <div id="food-list-container" class="space-y-4 mb-10">
                <div class="py-20 text-center text-gray-300 italic text-sm">載入資料中...</div>
            </div>
        </section>

        <!-- 其他占位分頁 -->
        <section id="plan" class="tab-content"><h2 class="text-2xl font-bold text-earth px-4 pt-10">行程安排建置中...</h2></section>
        <section id="wallet" class="tab-content"><h2 class="text-2xl font-bold text-earth px-4 pt-10">記帳本建置中...</h2></section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 px-6 py-4 flex justify-between items-center z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
        <button onclick="switchTab('plan')" class="flex flex-col items-center gap-1 text-gray-300 transition-colors">
            <i class="fa-solid fa-calendar-day text-lg"></i>
            <span class="text-[9px] font-bold">行程</span>
        </button>
        <button onclick="switchTab('food')" class="flex flex-col items-center gap-1 text-ramune transition-colors">
            <i class="fa-solid fa-bowl-food text-xl"></i>
            <span class="text-[9px] font-bold font-black">美食</span>
        </button>
        <button onclick="switchTab('wallet')" class="flex flex-col items-center gap-1 text-gray-300 transition-colors">
            <i class="fa-solid fa-wallet text-lg"></i>
            <span class="text-[9px] font-bold">記帳</span>
        </button>
    </nav>

    <script>
        let allRestaurants = [];
        let currentCategory = 'all';

        // 1. 讀取外部 CSV 檔案
        async function loadRestaurants() {
            try {
                const response = await fetch('./restaurants.csv');
                if (!response.ok) throw new Error('File not found');
                const csvText = await response.text();

                Papa.parse(csvText.replace(/^\ufeff/, ""), {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        allRestaurants = results.data.map(item => ({
                            ...item,
                            tabScore: parseFloat(item.TABELOG評分 || 0),
                            googScore: parseFloat(item.Google評分 || 0),
                            reviewCount: parseInt(item.Google評論數 || 0)
                        }));
                        applyAllFilters();
                    }
                });
            } catch (e) {
                document.getElementById('food-list-container').innerHTML = `
                    <div class="py-20 text-center px-6">
                        <i class="fa-solid fa-circle-exclamation text-3xl text-red-200 mb-4"></i>
                        <p class="text-sm text-gray-400 font-bold">找不到 restaurants.csv</p>
                        <p class="text-[10px] text-gray-300 mt-2 italic">請確保檔案位於相同的資料夾中</p>
                    </div>`;
            }
        }

        // 2. 切換分類功能
        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            const btnMap = { 'all': 'cat-all', 'ラーメン': 'cat-ramen', 'そば': 'cat-soba', 'うどん': 'cat-udon', '高評分': 'cat-high' };
            document.getElementById(btnMap[cat]).classList.add('active');
            applyAllFilters();
        }

        // 3. 過濾與排序邏輯
        function applyAllFilters() {
            const query = document.getElementById('food-search-input').value.toLowerCase();
            const sortBy = document.getElementById('food-sort').value;
            let filtered = [...allRestaurants];

            // A. 分類過濾
            if (currentCategory !== 'all') {
                if (currentCategory === '高評分') filtered = filtered.filter(i => i.tabScore >= 3.6);
                else filtered = filtered.filter(i => (i.分類 || "").includes(currentCategory));
            }

            // B. 關鍵字過濾
            if (query) {
                filtered = filtered.filter(i =>
                    (i.店名 || "").toLowerCase().includes(query) ||
                    (i.招牌菜 || "").toLowerCase().includes(query) ||
                    (i.分類 || "").toLowerCase().includes(query) ||
                    (i.餐廳特色 || "").toLowerCase().includes(query)
                );
            }

            // C. 排序
            filtered.sort((a, b) => {
                if (sortBy === 'tabelog') return b.tabScore - a.tabScore;
                if (sortBy === 'google') return b.googScore - a.googScore;
                return b.reviewCount - a.reviewCount;
            });

            renderFood(filtered);
        }

        // 4. 渲染 HTML (含排隊情況與預約建議)
        function renderFood(data) {
            const container = document.getElementById('food-list-container');
            document.getElementById('food-count').innerText = `${data.length} / ${allRestaurants.length}`;

            if (data.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-gray-300 italic text-xs">沒有找到符合的餐廳</div>`;
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="bg-white rounded-[2rem] p-5 custom-shadow border border-gray-50 active:scale-[0.98] transition-all">

                    <!-- 分類與評分欄 -->
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex flex-wrap gap-1 max-w-[65%]">
                            ${(item.分類 || "").split(',').slice(0, 2).map(c => `
                                <span class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-gray-50 text-gray-400 uppercase">${c.trim()}</span>
                            `).join('')}
                        </div>
                        <div class="flex gap-2 items-center shrink-0">
                            <div class="flex items-center gap-1">
                                <span class="w-3.5 h-3.5 bg-tabelog rounded-sm flex items-center justify-center text-[7px] text-white font-black italic">T</span>
                                <span class="text-xs font-black text-tabelog">${item.tabScore.toFixed(2)}</span>
                            </div>
                            <div class="flex items-center gap-1 border-l border-gray-100 pl-2">
                                <span class="w-3.5 h-3.5 bg-google rounded-sm flex items-center justify-center text-[7px] text-white font-bold">G</span>
                                <span class="text-xs font-black text-google">${item.googScore.toFixed(1)}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 店名與招牌菜 -->
                    <div class="mb-3">
                        <h4 class="font-bold text-[17px] text-earth leading-tight mb-1">${item.店名}</h4>
                        <p class="text-[10px] text-ramune font-bold flex items-center gap-1">
                            <i class="fa-solid fa-crown text-[8px]"></i> ${item.招牌菜 || '職人推薦'}
                        </p>
                    </div>

                    <!-- 預算 (詳細縮小版) -->
                    <div class="flex items-center gap-3 mb-4 bg-gray-50/60 py-1.5 px-3 rounded-xl w-fit border border-gray-100/50">
                        <div class="flex items-center gap-1.5">
                            <i class="fa-solid fa-sun text-[9px] text-gray-300"></i>
                            <span class="text-[10px] font-bold text-gray-500">${item.午餐預算 || '--'}</span>
                        </div>
                        <div class="w-[1px] h-2 bg-gray-200"></div>
                        <div class="flex items-center gap-1.5">
                            <i class="fa-solid fa-moon text-[9px] text-gray-300"></i>
                            <span class="text-[10px] font-bold text-gray-500">${item.晚餐預算 || '--'}</span>
                        </div>
                    </div>

                    <!-- 重點：排隊情況與預約建議 -->
                    <div class="grid grid-cols-1 gap-1.5 mb-4 border-l-2 border-ramune/20 pl-3">
                        <div class="flex items-start gap-2">
                            <i class="fa-solid fa-clock text-[10px] text-gray-300 mt-0.5"></i>
                            <p class="text-[10px] text-gray-500 font-medium leading-tight">
                                <span class="text-gray-400">排隊：</span>${item.排隊情況 || '無需久候'}
                            </p>
                        </div>
                        <div class="flex items-start gap-2">
                            <i class="fa-solid fa-calendar-check text-[10px] text-gray-300 mt-0.5"></i>
                            <p class="text-[10px] text-orange-400 font-bold leading-tight">
                                <span class="text-gray-400 font-medium">建議：</span>${item.預約建議 || '現場排隊'}
                            </p>
                        </div>
                    </div>

                    <!-- 特色與導航 -->
                    <div class="flex items-center justify-between gap-4 pt-3 border-t border-dashed border-gray-100">
                        <p class="text-[10px] text-gray-400 italic leading-snug line-clamp-1 flex-1">${item.餐廳特色 || ''}</p>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.店名 + ' 東京')}" target="_blank"
                           class="w-10 h-10 bg-ramune text-white rounded-2xl flex items-center justify-center shrink-0 shadow-lg shadow-ramune/20">
                            <i class="fa-solid fa-location-arrow text-sm"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // 5. 分頁切換功能
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // 初始化
        window.onload = loadRestaurants;
    </script>
</body>
</html>
