<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東京漫遊之旅 | Travel Handbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 PapaParse 用於解析 CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ramune: '#A2D2E2',
                        muji: '#F5F5F5',
                        earth: '#7F7F7F',
                        accent: '#E8F3F6'
                    },
                    fontFamily: { sans: ['M PLUS Rounded 1c', 'Noto Sans TC', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F5F5F5; color: #4A4A4A; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .bottom-nav-item.active { color: #A2D2E2; }
        .filter-btn.active { background-color: #A2D2E2; color: white; border-color: #A2D2E2; }
        .custom-shadow { box-shadow: 0 4px 15px rgba(162, 210, 226, 0.15); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24 font-sans no-scrollbar">

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-ramune/20 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-wider text-ramune uppercase">Tokyo Travel</h1>
            <p class="text-[10px] text-earth">2024 Handbook</p>
        </div>
        <div class="w-10 h-10 bg-ramune rounded-full flex items-center justify-center text-white shadow-lg shadow-ramune/20">
            <i class="fa-solid fa-utensils"></i>
        </div>
    </header>

    <main id="main-content" class="px-5 pt-6">
        
        <!-- PLAN (行程表) -->
        <section id="plan" class="tab-content active">
            <h2 class="text-2xl font-bold border-b-4 border-ramune inline-block mb-6 text-earth">行程規劃</h2>
            <div class="bg-white p-5 rounded-2xl custom-shadow mb-4">
                <p class="text-sm font-bold text-ramune mb-1">Day 4 銀座探索</p>
                <p class="text-xs text-earth">今日晚餐建議從美食分頁挑選燒肉名店。</p>
                <button onclick="switchTab('food')" class="mt-3 w-full bg-ramune/10 text-ramune py-2 rounded-xl text-xs font-bold">開啟美食篩選器</button>
            </div>
        </section>

        <!-- ATAMI (熱海專題) -->
        <section id="atami" class="tab-content">
            <h2 class="text-2xl font-bold border-b-4 border-orange-300 inline-block mb-6 text-earth">熱海專題</h2>
            <div class="bg-white p-5 rounded-2xl custom-shadow">
                <p class="text-sm font-bold text-orange-400">熱海 LA VISTA</p>
                <p class="text-xs text-earth">望海風呂、大正浪漫風。</p>
            </div>
        </section>

        <!-- FOOD (美食清單) -->
        <section id="food" class="tab-content">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-bold border-b-4 border-ramune inline-block text-earth">美食篩選</h2>
                <div class="flex flex-col items-end">
                    <span id="food-count" class="text-[10px] text-earth font-bold bg-white px-2 py-1 rounded-full border border-ramune/20 shadow-sm">0 項目</span>
                    <span id="data-source" class="text-[8px] text-earth/40 mt-1">載入中...</span>
                </div>
            </div>
            
            <div class="sticky top-[72px] z-20 bg-muji/90 backdrop-blur-sm pb-4">
                <div class="relative mb-3">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-ramune/50 text-xs"></i>
                    <input type="text" id="food-search-input" placeholder="搜尋店名或特色..." 
                        class="w-full bg-white border border-ramune/10 rounded-2xl pl-10 pr-4 py-3 text-sm shadow-sm focus:border-ramune transition-all"
                        onkeyup="runFilters()">
                </div>
                
                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                    <button onclick="setFilterType('all')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full border border-ramune/30 text-[11px] font-bold bg-white text-ramune active shadow-sm transition-all" id="btn-all">全部</button>
                    <button onclick="setFilterType('walkin')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full border border-ramune/30 text-[11px] font-bold bg-white text-ramune shadow-sm transition-all" id="btn-walkin">✨ Walk-in 友好</button>
                    <button onclick="setFilterType('highscore')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full border border-ramune/30 text-[11px] font-bold bg-white text-ramune shadow-sm transition-all" id="btn-high">🔥 高分推薦</button>
                </div>
            </div>
            
            <div id="food-list-container" class="bg-white rounded-3xl custom-shadow overflow-hidden mb-8 min-h-[100px]">
                <!-- 餐廳列將在此處渲染 -->
            </div>

            <div id="no-food-results" class="hidden text-center py-20 text-earth/50">
                <i class="fa-solid fa-filter-circle-xmark text-4xl mb-4 opacity-20"></i>
                <p class="text-sm italic">沒有符合條件的餐廳...</p>
            </div>
        </section>

        <!-- WALLET (記帳) -->
        <section id="wallet" class="tab-content">
            <h2 class="text-2xl font-bold border-b-4 border-ramune inline-block mb-6 text-earth">旅遊帳本</h2>
            <div id="expense-list" class="space-y-4"></div>
        </section>

        <!-- LISTS (清單) -->
        <section id="lists" class="tab-content">
            <h2 class="text-2xl font-bold border-b-4 border-ramune inline-block mb-6 text-earth">清單備忘</h2>
            <div id="checklist-container" class="space-y-3 mb-6"></div>
            <textarea id="memo-input" class="w-full bg-white rounded-2xl p-4 text-sm border-none shadow-sm mb-2" rows="4" placeholder="在此輸入您的備忘錄..."></textarea>
            <button onclick="saveMemo()" class="w-full bg-ramune text-white py-3 rounded-xl font-bold">儲存備忘</button>
            <div id="memo-display" class="mt-4 p-4 text-[11px] text-earth whitespace-pre-wrap leading-relaxed"></div>
        </section>

        <!-- INFO (資訊) -->
        <section id="info" class="tab-content">
            <h2 class="text-2xl font-bold border-b-4 border-ramune inline-block mb-6 text-earth">實用資訊</h2>
            <div class="bg-red-50 p-4 rounded-2xl border border-red-100 text-red-700 text-sm">
                <p class="font-bold mb-2">緊急聯絡</p>
                <div class="flex justify-between"><span>警察局</span><span class="font-bold">110</span></div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-ramune/10 px-2 py-3 flex justify-between items-center z-50">
        <button onclick="switchTab('plan')" class="bottom-nav-item flex-1 flex flex-col items-center gap-1 active"><i class="fa-solid fa-calendar-day text-lg"></i><span class="text-[9px] font-bold">行程</span></button>
        <button onclick="switchTab('atami')" class="bottom-nav-item flex-1 flex flex-col items-center gap-1"><i class="fa-solid fa-umbrella-beach text-lg"></i><span class="text-[9px] font-bold">熱海</span></button>
        <button onclick="switchTab('food')" class="bottom-nav-item flex-1 flex flex-col items-center gap-1"><i class="fa-solid fa-utensils text-lg"></i><span class="text-[9px] font-bold">美食</span></button>
        <button onclick="switchTab('wallet')" class="bottom-nav-item flex-1 flex flex-col items-center gap-1"><i class="fa-solid fa-wallet text-lg"></i><span class="text-[9px] font-bold">記帳</span></button>
        <button onclick="switchTab('lists')" class="bottom-nav-item flex-1 flex flex-col items-center gap-1"><i class="fa-solid fa-list-check text-lg"></i><span class="text-[9px] font-bold">清單</span></button>
        <button onclick="switchTab('info')" class="bottom-nav-item flex-1 flex flex-col items-center gap-1"><i class="fa-solid fa-circle-info text-lg"></i><span class="text-[9px] font-bold">資訊</span></button>
    </nav>

    <!-- 置頂按鈕 -->
    <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="fixed bottom-24 right-5 w-10 h-10 bg-white border border-ramune/30 text-ramune rounded-full shadow-lg flex items-center justify-center z-40 opacity-80 active:scale-95 transition-all">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script>
        // 預設餐廳資料庫 (當 CSV 讀取失敗時使用)
        let allRestaurants = [
            { name: "俺の焼肉 銀座4丁目", rating: 4.0, booking: "建議預約", walkin: "高", feature: "以極高 CP 值提供大量高品質 A5 和牛。", type: "燒肉" },
            { name: "ALEGRIA GINZA", rating: 4.2, booking: "建議預約", walkin: "中", feature: "巴西烤肉吃到飽，店員桌邊現切 20 種肉類。", type: "燒肉" },
            { name: "ぴょんぴょん舎 GINZA UNA", rating: 4.2, booking: "中", walkin: "高", feature: "盛岡冷麵與燒肉組合，景觀極佳。", type: "燒肉" },
            { name: "いふう (Ifu)", rating: 3.8, booking: "中", walkin: "高", feature: "韓式五花肉與野菜吃到飽，百貨內便利。", type: "燒肉" },
            { name: "銀座羊屋 はなれ", rating: 4.1, booking: "建議預約", walkin: "中", feature: "成吉思汗羊肉，使用澳洲空運生羔羊，完全沒有騷味。", type: "燒肉" },
            { name: "生ラム焼肉 羊ロック", rating: 4.4, booking: "建議預約", walkin: "中", feature: "主打鮮嫩的生羔羊肉，氣氛熱鬧，深受女性歡迎。", type: "燒肉" },
            { name: "KollaBo 銀座店", rating: 3.7, booking: "不需要", walkin: "極高", feature: "韓式料理集合店，提供燻製五花肉、醬蟹與各種燒肉。", type: "燒肉" },
            { name: "釜めし大統領", rating: 4.2, booking: "不需要", walkin: "高", feature: "韓式石鍋拌飯與韓式定食，午餐熱門。", type: "午餐" },
            { name: "焼肉 山水 銀座店", rating: 4.1, booking: "建議預約", walkin: "中", feature: "標榜「不冷凍」的生肉燒肉，強調肉質最原始的口感。", type: "燒肉" },
            { name: "YAKINIKU A FIVE 徳", rating: 4.5, booking: "建議預約", walkin: "中", feature: "主打 A5 級和牛午餐吃到飽（部分時段），CP 值極高。", type: "午餐" },
            { name: "焼肉 炙屋武蔵", rating: 4.1, booking: "建議預約", walkin: "中", feature: "提供極厚切牛舌與多樣化的和牛吃到飽選項。", type: "燒肉" },
            { name: "焼肉とワイン 醍醐", rating: 4.0, booking: "建議預約", walkin: "中", feature: "紅酒配燒肉，酒單選擇極豐富。", type: "燒肉" }
        ];

        let currentFilterType = 'all';

        // 從 GitHub 上的 CSV 讀取資料
        async function loadRestaurants() {
            const sourceEl = document.getElementById('data-source');
            try {
                // 假設 CSV 檔案放在同一個 GitHub 倉庫目錄下
                // 上傳到 GitHub Pages 後，路徑通常是 './restaurants.csv'
                const response = await fetch('./restaurants.csv');
                if (!response.ok) throw new Error('CSV not found');
                
                const csvText = await response.text();
                
                // 使用 PapaParse 解析
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        if (results.data && results.data.length > 0) {
                            // 轉換評分為數字
                            allRestaurants = results.data.map(item => ({
                                ...item,
                                rating: parseFloat(item.rating) || 0
                            }));
                            sourceEl.innerText = "資料來源：GitHub CSV";
                            renderFood(allRestaurants);
                        }
                    }
                });
            } catch (error) {
                console.log("Using local fallback data.");
                sourceEl.innerText = "資料來源：內建預設";
                renderFood(allRestaurants);
            }
        }

        function setFilterType(type) {
            currentFilterType = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if(type === 'all') document.getElementById('btn-all').classList.add('active');
            if(type === 'walkin') document.getElementById('btn-walkin').classList.add('active');
            if(type === 'highscore') document.getElementById('btn-high').classList.add('active');
            runFilters();
        }

        function runFilters() {
            const query = document.getElementById('food-search-input').value.toLowerCase();
            let filtered = allRestaurants;

            if (currentFilterType === 'walkin') {
                filtered = filtered.filter(item => item.walkin === "高" || item.walkin === "極高");
            } else if (currentFilterType === 'highscore') {
                filtered = filtered.filter(item => item.rating >= 4.2);
            }

            if (query) {
                filtered = filtered.filter(item => 
                    (item.name && item.name.toLowerCase().includes(query)) || 
                    (item.feature && item.feature.toLowerCase().includes(query))
                );
            }

            renderFood(filtered);
        }

        function renderFood(data) {
            const container = document.getElementById('food-list-container');
            const countEl = document.getElementById('food-count');
            const noResults = document.getElementById('no-food-results');
            
            countEl.innerText = `${data.length} 項目`;
            
            if (data.length === 0) {
                container.innerHTML = "";
                noResults.classList.remove('hidden');
                return;
            }
            
            noResults.classList.add('hidden');
            container.innerHTML = data.map(item => `
                <div class="flex items-center justify-between p-4 border-b border-ramune/10 active:bg-accent/30 transition-colors">
                    <div class="flex-1 min-w-0 pr-3">
                        <div class="flex items-center gap-2 mb-0.5">
                            <h4 class="font-bold text-sm text-earth truncate">${item.name || '未命名'}</h4>
                            <span class="text-[9px] font-bold text-orange-400 bg-orange-50 px-1 py-0.5 rounded">★${item.rating || '0'}</span>
                        </div>
                        <p class="text-[10px] text-earth/60 truncate mb-1.5 leading-relaxed">${item.feature || ''}</p>
                        <div class="flex flex-wrap gap-2">
                            <span class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-muji text-earth border border-muji">預約: ${item.booking || '未知'}</span>
                            <span class="text-[8px] font-bold px-1.5 py-0.5 rounded ${(item.walkin && item.walkin.includes('高')) ? 'bg-green-50 text-green-500' : 'bg-orange-50 text-orange-500'}">Walk-in: ${item.walkin || '未知'}</span>
                        </div>
                    </div>
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((item.name || '') + ' 銀座')}" target="_blank" 
                       class="w-9 h-9 flex items-center justify-center bg-ramune/10 text-ramune rounded-full shrink-0">
                       <i class="fa-solid fa-location-arrow text-sm"></i>
                    </a>
                </div>
            `).join('');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.bottom-nav-item').forEach(i => i.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.bottom-nav-item')).find(btn => btn.getAttribute('onclick').includes(id));
            if(activeBtn) activeBtn.classList.add('active');
            window.scrollTo(0,0);
        }

        function calculateRate() {
            const exp = document.getElementById('calc-input').value;
            try { const total = eval(exp.replace(/[^-+*/.0-9]/g, '')); document.getElementById('calc-result').classList.remove('hidden'); document.getElementById('twd-result').innerText = Math.round(total * 0.21).toLocaleString(); } catch (e) {}
        }

        let expenses = JSON.parse(localStorage.getItem('travel_expenses') || '[]');
        function renderExpenses() {
            const container = document.getElementById('expense-list');
            if(!container) return;
            container.innerHTML = expenses.map(e => `
                <div class="bg-white p-4 rounded-2xl custom-shadow flex justify-between items-center">
                    <div><p class="font-bold text-sm text-earth">${e.item}</p><p class="text-[10px] text-earth/50">${e.date}</p></div>
                    <p class="font-bold text-ramune text-lg">¥${e.amount.toLocaleString()}</p>
                </div>`).join('');
        }

        const checklist = ["護照", "Visit Japan Web", "日幣現金", "eSim", "充電線", "常備藥"];
        let checks = JSON.parse(localStorage.getItem('travel_checklist') || '{}');
        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            if(!container) return;
            container.innerHTML = checklist.map((item, idx) => `
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="c-${idx}" ${checks[idx]?'checked':''} onchange="toggle(${idx})" class="accent-ramune">
                    <label for="c-${idx}" class="text-sm ${checks[idx]?'line-through opacity-50':''} text-earth">${item}</label>
                </div>`).join('');
        }
        function toggle(i) { checks[i] = !checks[i]; localStorage.setItem('travel_checklist', JSON.stringify(checks)); renderChecklist(); }

        function saveMemo() { localStorage.setItem('travel_memo', document.getElementById('memo-input').value); renderMemo(); }
        function renderMemo() {
            const t = localStorage.getItem('travel_memo') || "";
            const memoInput = document.getElementById('memo-input');
            const memoDisplay = document.getElementById('memo-display');
            if(memoInput) memoInput.value = t;
            if(memoDisplay) memoDisplay.innerText = t;
        }

        window.onload = () => {
            loadRestaurants(); // 優先從 CSV 載入
            renderExpenses();
            renderChecklist();
            renderMemo();
        };
    </script>
</body>
</html>
